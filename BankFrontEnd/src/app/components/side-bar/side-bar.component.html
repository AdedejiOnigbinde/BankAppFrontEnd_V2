<div class="sticky top-0 h-screen bg-primaryGreenDark flex flex-col overflow-auto shadow-lg">

  <!-- Brand -->
  <div class="px-5 py-6 border-b border-primaryGreenActive shrink-0">
    <div class="flex items-center gap-3">
      <i class="bi bi-bank text-2xl text-white"></i>
      <span class="text-white text-lg font-bold font-mulish">Handle Money</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-4 space-y-2 overflow-y-auto">

    <!-- Account -->
    <div>
      <button (click)="toggleSection('account')"
        class="w-full flex items-center justify-between px-3 py-2 text-xs font-bold uppercase tracking-widest text-primaryGreenLightActive hover:text-white transition-colors rounded-md">
        <span class="font-mulish">Account</span>
        <i class="bi bi-chevron-up transition-transform duration-200 text-xs"
          [class.rotate-180]="openSection !== 'account'"></i>
      </button>
      <div [hidden]="openSection !== 'account'" class="mt-1 space-y-0.5">
        <a routerLink="/client" [routerLinkActiveOptions]="{exact: true}"
          routerLinkActive="bg-primaryGreen text-white font-bold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-primaryGreenActive hover:text-white transition-colors font-mulish cursor-pointer">
          <i class="bi bi-grid-fill text-base w-5 text-center"></i>
          <span class="text-sm">Dashboard</span>
        </a>
        <a routerLink="/client/newaccount" routerLinkActive="bg-primaryGreen text-white font-bold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-primaryGreenActive hover:text-white transition-colors font-mulish cursor-pointer">
          <i class="bi bi-plus-circle text-base w-5 text-center"></i>
          <span class="text-sm">Open Account</span>
        </a>
        <a routerLink="/client/transfer" routerLinkActive="bg-primaryGreen text-white font-bold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-primaryGreenActive hover:text-white transition-colors font-mulish cursor-pointer">
          <i class="bi bi-arrow-left-right text-base w-5 text-center"></i>
          <span class="text-sm">Transfer</span>
        </a>
        <a routerLink="/client/deposit" routerLinkActive="bg-primaryGreen text-white font-bold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-primaryGreenActive hover:text-white transition-colors font-mulish cursor-pointer">
          <i class="bi bi-cash-stack text-base w-5 text-center"></i>
          <span class="text-sm">Deposit</span>
        </a>
      </div>
    </div>

    <!-- Loan -->
    <div>
      <button (click)="toggleSection('loan')"
        class="w-full flex items-center justify-between px-3 py-2 text-xs font-bold uppercase tracking-widest text-primaryGreenLightActive hover:text-white transition-colors rounded-md">
        <span class="font-mulish">Loan</span>
        <i class="bi bi-chevron-up transition-transform duration-200 text-xs"
          [class.rotate-180]="openSection !== 'loan'"></i>
      </button>
      <div [hidden]="openSection !== 'loan'" class="mt-1 space-y-0.5">
        <a routerLink="/client/getloan" routerLinkActive="bg-primaryGreen text-white font-bold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-primaryGreenActive hover:text-white transition-colors font-mulish cursor-pointer">
          <i class="bi bi-file-text text-base w-5 text-center"></i>
          <span class="text-sm">Apply for Loan</span>
        </a>
        <a routerLink="/client/payloan" routerLinkActive="bg-primaryGreen text-white font-bold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-primaryGreenActive hover:text-white transition-colors font-mulish cursor-pointer">
          <i class="bi bi-credit-card text-base w-5 text-center"></i>
          <span class="text-sm">My Loans</span>
        </a>
      </div>
    </div>

    <!-- Bill Payment -->
    <div>
      <button (click)="toggleSection('bills')"
        class="w-full flex items-center justify-between px-3 py-2 text-xs font-bold uppercase tracking-widest text-primaryGreenLightActive hover:text-white transition-colors rounded-md">
        <span class="font-mulish">Bill Payment</span>
        <i class="bi bi-chevron-up transition-transform duration-200 text-xs"
          [class.rotate-180]="openSection !== 'bills'"></i>
      </button>
      <div [hidden]="openSection !== 'bills'" class="mt-1 space-y-0.5">
        <a routerLink="/client/paybill" routerLinkActive="bg-primaryGreen text-white font-bold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-primaryGreenActive hover:text-white transition-colors font-mulish cursor-pointer">
          <i class="bi bi-receipt text-base w-5 text-center"></i>
          <span class="text-sm">Pay Bill</span>
        </a>
      </div>
    </div>

    <!-- Profile -->
    <div>
      <button (click)="toggleSection('profile')"
        class="w-full flex items-center justify-between px-3 py-2 text-xs font-bold uppercase tracking-widest text-primaryGreenLightActive hover:text-white transition-colors rounded-md">
        <span class="font-mulish">Profile</span>
        <i class="bi bi-chevron-up transition-transform duration-200 text-xs"
          [class.rotate-180]="openSection !== 'profile'"></i>
      </button>
      <div [hidden]="openSection !== 'profile'" class="mt-1 space-y-0.5">
        <a routerLink="/client/settings" routerLinkActive="bg-primaryGreen text-white font-bold"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-primaryGreenActive hover:text-white transition-colors font-mulish cursor-pointer">
          <i class="bi bi-gear text-base w-5 text-center"></i>
          <span class="text-sm">Settings</span>
        </a>
      </div>
    </div>

  </nav>

  <!-- Logout pinned to bottom -->
  <div class="px-3 py-4 border-t border-primaryGreenActive shrink-0">
    <button (click)="logout()"
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/75 hover:bg-red-900/40 hover:text-red-300 transition-colors font-mulish">
      <i class="bi bi-box-arrow-right text-base w-5 text-center"></i>
      <span class="text-sm">Log Out</span>
    </button>
  </div>

</div>
