<main>
  <div class="container mx-auto flex items-center justify-center min-h-screen px-4 py-8">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">

      <!-- Card header -->
      <div class="bg-primaryGreen px-6 py-8 sm:px-10 sm:py-10 text-center">
        <i class="bi bi-bank text-4xl sm:text-5xl text-white"></i>
        <h1 class="text-white text-xl sm:text-2xl font-bold mt-3 font-mulish">Handle Money</h1>
        <p class="text-primaryGreenLightActive text-sm mt-1 font-mulish mb-0">Welcome back! Please sign in to continue.</p>
      </div>

      <!-- Form body -->
      <div class="px-6 py-6 sm:px-8 sm:py-8">

        <div class="p-3 mb-5 text-sm text-red-800 border border-red-300 rounded-lg bg-red-50" role="alert"
          *ngIf="errorMessage">
          <span class="font-medium">{{errorMessage}}</span>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="login()">

          <!-- Username -->
          <div class="mb-5">
            <label for="userNameInput" class="block text-sm font-semibold text-gray-700 font-mulish mb-2">User Name</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-3 flex items-center text-gray-400 pointer-events-none">
                <i class="bi bi-person text-lg"></i>
              </span>
              <input type="text"
                class="pl-10 w-full rounded-lg border border-gray-300 py-3 pr-3 font-mulish focus:ring-4 focus:ring-primaryGreenLightActive focus:border-primaryGreen outline-none transition-all"
                id="userNameInput" formControlName="userName"
                [ngClass]="{'border-red-400': submitted && loginForm.controls['userName'].errors}"
                placeholder="Enter your username">
            </div>
            <p *ngIf="submitted && loginForm.controls['userName'].hasError('required')"
              class="text-red-600 text-sm mt-1 font-mulish">This field is required.</p>
          </div>

          <!-- Password -->
          <div class="mb-6">
            <label for="passwordInput" class="block text-sm font-semibold text-gray-700 font-mulish mb-2">Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-3 flex items-center text-gray-400 pointer-events-none">
                <i class="bi bi-lock text-lg"></i>
              </span>
              <input [type]="showPassword ? 'text' : 'password'"
                class="pl-10 pr-10 w-full rounded-lg border border-gray-300 py-3 font-mulish focus:ring-4 focus:ring-primaryGreenLightActive focus:border-primaryGreen outline-none transition-all"
                id="passwordInput" formControlName="password"
                [ngClass]="{'border-red-400': submitted && loginForm.controls['password'].errors}"
                placeholder="Enter your password">
              <button type="button" (click)="showPassword = !showPassword"
                class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-primaryGreen transition-colors">
                <i [class]="showPassword ? 'bi bi-eye-slash text-lg' : 'bi bi-eye text-lg'"></i>
              </button>
            </div>
            <p *ngIf="submitted && loginForm.controls['password'].hasError('required')"
              class="text-red-600 text-sm mt-1 font-mulish">This field is required.</p>
          </div>

          <button type="submit"
            class="w-full h-12 rounded-lg bg-primaryGreen text-white font-bold text-base shadow-md hover:bg-primaryGreenDark hover:shadow-lg hover:scale-105 active:scale-95 transition-all duration-200">
            Login
          </button>

        </form>

        <p class="text-center text-sm font-mulish mt-6 mb-0 text-gray-600">
          Don't have an account?
          <a routerLink="/register" class="text-primaryGreen font-semibold hover:underline no-underline">Register</a>
        </p>

      </div>
    </div>
  </div>
</main>
